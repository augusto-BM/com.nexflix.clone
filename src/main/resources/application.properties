spring.application.name=com.nexflix.clone

# =========================
# BASE DE DATOS (MySQL)
# =========================

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# URL de conexión a MySQL (localhost, puerto 3306, base de datos)
spring.datasource.url=jdbc:mysql://localhost:3306/java_nexflix_clone

# Usuario de MySQL
spring.datasource.username=root

# Contraseña de MySQL
spring.datasource.password=

# =========================
# JPA / HIBERNATE
# =========================

# Mostrar queries SQL en consola
spring.jpa.show-sql=true

# Actualiza automáticamente las tablas
spring.jpa.hibernate.ddl-auto=update

# Dialecto para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Formatea SQL en consola
spring.jpa.properties.hibernate.format_sql=true

# =========================
# SUBIDA DE ARCHIVOS
# =========================

# Habilita subida de archivos
spring.servlet.multipart.enabled=true

# Tamaño máximo de archivo
spring.servlet.multipart.max-file-size=2GB

# Tamaño máximo de request
spring.servlet.multipart.max-request-size=2GB

# Límites de Tomcat
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1

# Rutas donde se guardan archivos
file.upload.video-dir=uploads/videos
file.upload.image-dir=uploads/images

# =========================
# EMAIL (GMAIL SMTP)
# =========================

# Servidor SMTP de Gmail
spring.mail.host=smtp.gmail.com

# Puerto SMTP
spring.mail.port=587

# Usuario de correo
spring.mail.username=aea@gmail.com

# Contraseña del correo
spring.mail.password=aea123456

# Autenticación SMTP
spring.mail.properties.mail.smtp.auth=true

# TLS (seguridad)
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Timeout de conexión
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# URL del frontend (React u otro)
app.frontend.url=http://localhost:4200